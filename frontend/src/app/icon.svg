<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background -->
  <rect x="5" y="5" width="90" height="90" rx="25" fill="#080b11" stroke="#10b981" stroke-width="6" />
  
  <!-- CPU Chip Core -->
  <rect x="32" y="32" width="36" height="36" rx="6" fill="none" stroke="#10b981" stroke-width="5" />
  <rect x="44" y="44" width="12" height="12" rx="2" fill="none" stroke="#10b981" stroke-width="4" />
  
  <!-- CPU Pins -->
  <!-- Top Pins -->
  <line x1="40" y1="20" x2="40" y2="32" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="50" y1="20" x2="50" y2="32" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="60" y1="20" x2="60" y2="32" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  
  <!-- Bottom Pins -->
  <line x1="40" y1="68" x2="40" y2="80" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="50" y1="68" x2="50" y2="80" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="60" y1="68" x2="60" y2="80" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  
  <!-- Left Pins -->
  <line x1="20" y1="40" x2="32" y2="40" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="20" y1="50" x2="32" y2="50" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="20" y1="60" x2="32" y2="60" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  
  <!-- Right Pins -->
  <line x1="68" y1="40" x2="80" y2="40" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="68" y1="50" x2="80" y2="50" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
  <line x1="68" y1="60" x2="80" y2="60" stroke="#10b981" stroke-width="5" stroke-linecap="round" />
</svg>
